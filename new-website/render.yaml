services:
  - type: web
    name: growing-minds-school
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_BACKEND
        value: filesystem
      - key: DATA_DIR
        value: /data
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
    disk:
      name: growing-minds-data
      mountPath: /data
      sizeGB: 1

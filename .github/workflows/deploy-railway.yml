# Deploy to Railway when RAILWAY_TOKEN is configured.
# Setup: Railway → Project → Settings → Tokens → create token
# GitHub → repo Settings → Secrets → RAILWAY_TOKEN

name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - "new-website/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new-website
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach
